<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | FIT MY FABRICS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-light);">
        <div style="background: var(--white); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
            <h2 class="text-center mb-2">Admin Login</h2>
            <form id="login-form" onsubmit="adminApp.login(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
        </div>
    </div>

    <!-- Admin Layout -->
    <div id="admin-layout" class="admin-layout hidden">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">FIT MY FABRICS</div>
            <ul class="admin-nav">
                <li><a href="#" class="active" onclick="adminApp.navigate('dashboard', this)">Dashboard</a></li>
                <li><a href="#" onclick="adminApp.navigate('products', this)">Products</a></li>
                <li><a href="#" onclick="adminApp.navigate('categories', this)">Categories</a></li>
                <li><a href="#" onclick="adminApp.navigate('orders', this)">Orders</a></li>
                <li><a href="#" onclick="adminApp.navigate('customers', this)">Customers</a></li>
                <li><a href="#" onclick="adminApp.navigate('appearance', this)">Appearance</a></li>
                <li><a href="#" onclick="adminApp.navigate('settings', this)">Settings</a></li>
                <li><a href="#" onclick="adminApp.logout()" style="color: #fca5a5;">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-main" id="admin-content">
            <!-- Content injected by JS -->
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" style="margin: 0 auto 1rem;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <h2>Confirm Delete</h2>
            <p id="delete-msg" class="mt-1 mb-2" style="color: var(--text-light);">Are you sure you want to delete this item? This action cannot be undone.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-outline" onclick="adminApp.closeModal('delete-modal')">Cancel</button>
                <button class="btn" style="background: var(--danger);" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px;">
            <button class="modal-close" onclick="adminApp.closeModal('product-modal')">&times;</button>
            <h2 id="product-modal-title">Add Product</h2>
            <form id="product-form" onsubmit="adminApp.saveProduct(event)" class="mt-2">
                <input type="hidden" id="p-id">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 250px;">
                        <label>Product Name *</label>
                        <input type="text" id="p-name" required>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 250px;">
                        <label>Category *</label>
                        <select id="p-category" required></select>
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Price (৳) *</label>
                        <input type="number" id="p-price" required min="0">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Discount Price (৳)</label>
                        <input type="number" id="p-discount" min="0">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Stock *</label>
                        <input type="number" id="p-stock" required min="0">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>SKU</label>
                        <input type="text" id="p-sku">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p-desc" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Sizes (comma separated, e.g., S, M, L, XL)</label>
                    <input type="text" id="p-sizes" placeholder="S, M, L">
                </div>
                <div class="form-group">
                    <label>Colors (comma separated hex codes, e.g., #000000, #ffffff)</label>
                    <input type="text" id="p-colors" placeholder="#000000, #ffffff">
                </div>
                <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                    <label><input type="checkbox" id="p-active" checked> Active Status</label>
                    <label><input type="checkbox" id="p-featured"> Featured</label>
                    <label><input type="checkbox" id="p-new"> New Arrival</label>
                </div>
                <div class="form-group">
                    <label>Images</label>
                    <input type="file" id="p-images" accept="image/*" multiple onchange="adminApp.handleImageUpload(event, 'p-image-preview')">
                    <div id="p-image-preview" class="image-preview-area"></div>
                </div>
                <button type="submit" class="btn btn-primary">Save Product</button>
            </form>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="category-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="adminApp.closeModal('category-modal')">&times;</button>
            <h2 id="cat-modal-title">Add Category</h2>
            <form id="category-form" onsubmit="adminApp.saveCategory(event)" class="mt-2">
                <input type="hidden" id="c-id">
                <div class="form-group">
                    <label>Category Name *</label>
                    <input type="text" id="c-name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="c-desc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="c-active" checked> Active Status</label>
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" id="c-image" accept="image/*" onchange="adminApp.handleSingleImageUpload(event, 'c-image-preview')">
                    <div id="c-image-preview" class="image-preview-area"></div>
                </div>
                <button type="submit" class="btn btn-primary">Save Category</button>
            </form>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px;">
            <button class="modal-close" onclick="adminApp.closeModal('order-modal')">&times;</button>
            <h2>Order Details</h2>
            <div id="order-detail-content" class="mt-2"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
